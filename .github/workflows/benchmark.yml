name: Benchmark → Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  benchmark:
    name: Run benchmark
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 60

    env:
      JULIA_NUM_THREADS: auto

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - name: Add LegendJuliaRegistry
        run: |
          julia -e '
            using Pkg
            Pkg.Registry.add(RegistrySpec(url="https://github.com/legend-exp/LegendJuliaRegistry"))
            Pkg.Registry.add("General")
          '

      - name: Install dependencies
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run benchmark
        run: julia --project=. --threads=auto scripts/benchmark.jl

      - name: Prepare Pages site
        run: |
          mkdir -p site
          cp output/benchmark.html site/index.html
          cp output/benchmark.json site/benchmark.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Upload benchmark data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: output/
          retention-days: 90

  deploy:
    name: Deploy to Pages
    needs: benchmark
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
