name: Compare SSD vs CTSI

on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  compare:
    name: Run comparison
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 90

    env:
      JULIA_NUM_THREADS: auto

    steps:
      - name: Checkout SSD
        uses: actions/checkout@v4
        with:
          path: ssd

      - name: Checkout CTSI
        uses: actions/checkout@v4
        with:
          repository: RIL-Hub/CTSI
          path: ctsi
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone weighting-potential-sim
        run: git clone https://github.com/MaxTeicheira/weighting-potential-sim.git

      # ── Python setup (self-hosted runner has Python 3.9, need ≥3.10) ──
      - name: Clean stale micromamba state
        run: |
          rm -f /home/mteichei/micromamba-bin/micromamba
          rm -rf /home/mteichei/micromamba/envs/ctsi

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: ctsi
          create-args: python=3.11 numpy scipy matplotlib
          init-shell: bash

      - name: Install Python deps
        shell: micromamba-shell {0}
        run: pip install -e weighting-potential-sim

      - name: Generate CTSI fields
        shell: micromamba-shell {0}
        run: python weighting-potential-sim/generate_ctsi_v4_fields.py

      - name: Copy fields to CTSI
        run: |
          mkdir -p ctsi/ctsi/currCZT
          cp output/ctsi_v4/*.dat ctsi/ctsi/currCZT/

      - name: Build CTSI
        run: |
          cd ctsi/ctsi
          bash compile_all.sh

      - name: Prepare CTSI runtime
        run: |
          cd ctsi/ctsi
          mkdir -p output
          touch single_event.txt

      # ── CTSI: single event (x=0.01 near center anode, y=0.25 mid-cathode) ──
      - name: Run CTSI event (center, mid-depth, 662 keV)
        shell: micromamba-shell {0}
        run: |
          cd ctsi/ctsi
          python3 -m tools.ctsi_toolkit run-event \
            --x 0.01 --y 0.25 --z 0.25 --energy 0.662

      # ── CTSI: z-scan (9 depths, same lateral position) ──
      - name: Run CTSI z-scan (9 depths)
        shell: micromamba-shell {0}
        run: |
          cd ctsi/ctsi
          mkdir -p output/zscan
          for z in 0.05 0.10 0.15 0.20 0.25 0.30 0.35 0.40 0.45; do
            echo "=== CTSI z=$z cm ==="
            mkdir -p output/zscan/z_${z}
            python3 -m tools.ctsi_toolkit run-event \
              --x 0.01 --y 0.25 --z $z --energy 0.662
            cp output/interactiveOut.txt output/zscan/z_${z}/interactiveOut.txt
          done

      # ── SSD setup ──
      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - name: Add LegendJuliaRegistry
        run: |
          julia -e '
            using Pkg
            Pkg.Registry.add(RegistrySpec(url="https://github.com/legend-exp/LegendJuliaRegistry"))
            Pkg.Registry.add("General")
          '

      - name: Install SSD dependencies
        run: julia --project=ssd -e 'using Pkg; Pkg.instantiate()'

      # ── SSD: single event ──
      - name: Run SSD event (matching position)
        env:
          SSD_ENERGY_KEV: "662"
          SSD_X_MM: "0.0"
          SSD_Y_MM: "2.5"
          SSD_Z_MM: "0.0"
          SSD_N_CARRIERS: "50"
          SSD_MODE: "single"
        run: |
          cd ssd
          julia --project=. --threads=auto scripts/export_waveforms.jl

      # ── SSD: z-scan ──
      - name: Run SSD z-scan (9 depths)
        env:
          SSD_ENERGY_KEV: "662"
          SSD_X_MM: "0.0"
          SSD_Y_MM: "2.5"
          SSD_N_CARRIERS: "50"
          SSD_MODE: "zscan"
        run: |
          cd ssd
          julia --project=. --threads=auto scripts/export_waveforms.jl

      # ── Comparison: single event ──
      - name: Generate single-event comparison report
        shell: micromamba-shell {0}
        run: |
          python3 ssd/scripts/compare.py \
            --mode single \
            --ssd ssd/output/ssd_waveforms.json \
            --ctsi ctsi/ctsi/output/interactiveOut.txt \
            --ctsi-root ctsi/ctsi \
            --output ssd/output/comparison.html

      # ── Comparison: z-scan ──
      - name: Generate z-scan comparison report
        shell: micromamba-shell {0}
        run: |
          python3 ssd/scripts/compare.py \
            --mode zscan \
            --ssd ssd/output/ssd_zscan.json \
            --ctsi-dir ctsi/ctsi/output/zscan \
            --ctsi-root ctsi/ctsi \
            --output ssd/output/zscan_comparison.html

      - name: Prepare Pages site
        run: |
          mkdir -p site
          cp ssd/output/comparison.html site/index.html
          cp ssd/output/zscan_comparison.html site/zscan.html
          cp ssd/output/ssd_waveforms.json site/ssd_waveforms.json
          cp ssd/output/ssd_zscan.json site/ssd_zscan.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Upload all results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comparison-results
          path: |
            ssd/output/
            ctsi/ctsi/output/
          retention-days: 90

  deploy:
    name: Deploy to Pages
    needs: compare
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
