name: CZT Strip Detector

units:
  length: mm
  angle: deg
  potential: V
  temperature: K

grid:
  coordinates: cartesian
  axes:
    x:
      from: -22
      to: 22
      boundaries:
        left: reflecting
        right: reflecting
    y:
      from: -22
      to: 22
      boundaries:
        left: reflecting
        right: reflecting
    z:
      from: -4
      to: 4
      boundaries:
        left: reflecting
        right: reflecting

medium: vacuum

detectors:
  - semiconductor:
      material: CdZnTe
      temperature: 293
      geometry:
        box:
          widths: [40, 40, 5]
      impurity_density:
        name: constant
        value: 0

    contacts:
      # ── Anode strips (z = +2.5 mm, top face) ──
      # 5 strips along x-axis, 100 μm wide, 1 mm pitch, 0 V

      - id: 1
        potential: 0
        geometry:
          box:
            hX: 0.05
            hY: 20
            hZ: 0
            origin: [-2, 0, 2.5]

      - id: 2
        potential: 0
        geometry:
          box:
            hX: 0.05
            hY: 20
            hZ: 0
            origin: [-1, 0, 2.5]

      - id: 3
        potential: 0
        geometry:
          box:
            hX: 0.05
            hY: 20
            hZ: 0
            origin: [0, 0, 2.5]

      - id: 4
        potential: 0
        geometry:
          box:
            hX: 0.05
            hY: 20
            hZ: 0
            origin: [1, 0, 2.5]

      - id: 5
        potential: 0
        geometry:
          box:
            hX: 0.05
            hY: 20
            hZ: 0
            origin: [2, 0, 2.5]

      # ── Steering electrode (z = +2.5 mm, top face) ──
      # 6 strips, 400 μm wide, -80 V, single electrical contact

      - id: 6
        potential: -80
        geometry:
          union:
            - box:
                hX: 0.2
                hY: 20
                hZ: 0
                origin: [-2.5, 0, 2.5]
            - box:
                hX: 0.2
                hY: 20
                hZ: 0
                origin: [-1.5, 0, 2.5]
            - box:
                hX: 0.2
                hY: 20
                hZ: 0
                origin: [-0.5, 0, 2.5]
            - box:
                hX: 0.2
                hY: 20
                hZ: 0
                origin: [0.5, 0, 2.5]
            - box:
                hX: 0.2
                hY: 20
                hZ: 0
                origin: [1.5, 0, 2.5]
            - box:
                hX: 0.2
                hY: 20
                hZ: 0
                origin: [2.5, 0, 2.5]

      # ── Cathode strips (z = -2.5 mm, bottom face) ──
      # 2 strips along y-axis, 4.9 mm wide, 100 μm gap at y=0, -600 V

      - id: 7
        potential: -600
        geometry:
          box:
            hX: 20
            hY: 2.45
            hZ: 0
            origin: [0, -2.5, -2.5]

      - id: 8
        potential: -600
        geometry:
          box:
            hX: 20
            hY: 2.45
            hZ: 0
            origin: [0, 2.5, -2.5]
