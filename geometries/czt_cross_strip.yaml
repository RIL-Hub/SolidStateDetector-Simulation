name: CZT Cross-Strip Detector

units:
  length: mm
  angle: deg
  potential: V
  temperature: K

grid:
  coordinates: cartesian
  axes:
    x:
      from: -10
      to: 10
      boundaries:
        left: reflecting
        right: reflecting
    y:
      from: -10
      to: 10
      boundaries:
        left: reflecting
        right: reflecting
    z:
      from: 0
      to: 10
      boundaries:
        left: fixed
        right: fixed

medium: vacuum

detectors:
  - semiconductor:
      material: CdZnTe
      temperature: 300
      geometry:
        box:
          widths: [20, 20, 10]
          origin: [0, 0, 5]

    contacts:
      # Cathode - full planar electrode on top at z=10
      - id: 1
        potential: -1000
        geometry:
          box:
            hX: 10
            hY: 10
            hZ: 0
            origin: [0, 0, 10]

      # Anode strip 1 - bottom, centered at y = -7.5
      - id: 2
        potential: 0
        geometry:
          box:
            hX: 10
            hY: 1.5
            hZ: 0
            origin: [0, -7.5, 0]

      # Anode strip 2 - bottom, centered at y = -2.5
      - id: 3
        potential: 0
        geometry:
          box:
            hX: 10
            hY: 1.5
            hZ: 0
            origin: [0, -2.5, 0]

      # Anode strip 3 - bottom, centered at y = 2.5
      - id: 4
        potential: 0
        geometry:
          box:
            hX: 10
            hY: 1.5
            hZ: 0
            origin: [0, 2.5, 0]

      # Anode strip 4 - bottom, centered at y = 7.5
      - id: 5
        potential: 0
        geometry:
          box:
            hX: 10
            hY: 1.5
            hZ: 0
            origin: [0, 7.5, 0]
